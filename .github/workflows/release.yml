name: Release Build

# 打形如 v1.0.0 的标签时触发；也可在 Actions 页手动运行。
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Test main app
        run: flutter test

      - name: Test installer app
        shell: pwsh
        run: |
          Push-Location installer/app
          flutter pub get
          dart analyze
          flutter test
          Pop-Location

      - name: Build Windows release
        run: flutter build windows --release

      - name: Package Windows artifact
        shell: pwsh
        run: |
          $src = 'build/windows/x64/runner/Release'
          $zip = 'liuyao-windows-x64.zip'
          Compress-Archive -Path "$src/*" -DestinationPath $zip -Force

      - name: Build Windows installer
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\build_installer.ps1 -SkipAppBuild

      - uses: actions/upload-artifact@v4
        with:
          name: liuyao-windows-x64
          path: liuyao-windows-x64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: liuyao-windows-installer
          path: dist/liuyao-installer-windows-x64-v*.zip

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          version="$(grep '^version:' pubspec.yaml | awk '{print $2}' | tr '+' '-')"
          apk_name="liuyao-v${version}-android-release.apk"
          mv build/app/outputs/flutter-apk/app-release.apk "$apk_name"
          echo "APK_NAME=$apk_name" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: liuyao-android
          path: ${{ env.APK_NAME }}

  release:
    name: Publish Release
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/liuyao-windows-installer/liuyao-installer-windows-x64-v*.zip
            dist/liuyao-windows-x64/liuyao-windows-x64.zip
            dist/liuyao-android/liuyao-v*-android-release.apk
          generate_release_notes: true
