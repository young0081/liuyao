name: Release Build

# 打形如 v1.0.0 的标签时触发；也可在 Actions 页手动运行。
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Package Windows artifact
        shell: pwsh
        run: |
          $src = 'build/windows/x64/runner/Release'
          $zip = 'liuyao-windows-x64.zip'
          Compress-Archive -Path "$src/*" -DestinationPath $zip -Force

      - uses: actions/upload-artifact@v4
        with:
          name: liuyao-windows-x64
          path: liuyao-windows-x64.zip

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk liuyao-android.apk

      - uses: actions/upload-artifact@v4
        with:
          name: liuyao-android
          path: liuyao-android.apk

  release:
    name: Publish Release
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/liuyao-windows-x64/liuyao-windows-x64.zip
            dist/liuyao-android/liuyao-android.apk
          generate_release_notes: true
